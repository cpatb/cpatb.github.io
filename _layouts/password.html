---
layout: default
---

<div id="main" role="main">
  <div class="password-gate" id="password-form">
    <h1 class="page__title">Protected Content</h1>
    <p class="password-gate__note">Please enter the password to view this page.</p>
    <div class="password-gate__row">
      <input type="password" id="password" placeholder="Password" aria-label="Password">
      <button type="button" onclick="checkPassword()">Enter</button>
    </div>
    <p id="password-error" class="password-gate__error" style="display: none;">Incorrect password.</p>
  </div>

  <div id="protected-content" style="display: none;">
    {% if page.title %}<h1 class="page__title">{{ page.title }}</h1>{% endif %}
    <section class="page__content">
      {{ content }}
    </section>
  </div>
</div>

<script>
  function checkPassword() {
    var correctPassword = "splat";
    var enteredPassword = document.getElementById('password').value;

    if (enteredPassword === correctPassword) {
      document.getElementById('password-form').style.display = 'none';
      document.getElementById('protected-content').style.display = 'block';
    } else {
      document.getElementById('password-error').style.display = 'block';
    }
  }

  document.getElementById('password').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      checkPassword();
    }
  });
</script>
